<!-- Contact -->
<section class="contact">
<div class="container py-5">
  <h1 class="text-center mb-4">Contactez-nous</h1>
  <div class="row">
    <!--Formulaire-->
    <div class="col-md-6">
      <form id="contactForm">
        <input type="text" id="name" class="form-control mb-2" placeholder="Nom">
        <small id="nameError"></small>
        
        <input type="email" id="email" class="form-control mb-2" placeholder="Email">
        <small id="emailError"></small>
        <select id="sujet" class="form-control mb-2">
          <option value="">Choisir un Sujet</option>
          <option>Support</option>
          <option>Question</option>
        </select>
        <small id="sujetError"></small>
        <textarea id="message" class="form-control mb-2" placeholder="Message"></textarea>
        <small id="messageError"></small>
       <button type="submit">Emvoyer</button>
        <p id="succesMessage"></p>
      </form>

    </div>
    <!--INFOS-->
    <div class="col-md-6">
      <h2>Contact</h2>
      <p>Email: contact@AfricaTalent.com</p>
      <p>Telephone: + 221 77 000 00 00</p>
      <p>Adress: Dakar, Senegal</p>
      

    </div>

  </div>

</div>
